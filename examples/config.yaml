hermes:
  sqlite_path: "${HERMES_HOME}/state.db"
  original_provider: "graphiti"

hermes_schema:
  table: "messages"
  id_column: "id"
  session_column: "session_id"
  role_column: "role"
  content_column: "content"
  created_at_column: "timestamp"

memory_index:
  sqlite_path: "${HERMES_HOME}/memory/local_memory/memory_index.sqlite"
  use_wal: true

provider_adapter:
  provider_name: "local_memory"
  fail_open: true

recall:
  total_timeout_ms: 1000
  hard_timeout_ms: 1500
  max_results: 6
  max_context_tokens: 1200
  context_window_before: 3
  context_window_after: 3

ingest:
  allowed_roles:
    - "user"
    - "assistant"
  drop_skill_invocation_messages: true
  max_content_chars: 12000

fts:
  enabled: true
  timeout_ms: 300
  use_jieba: false
  max_results: 20

graphiti:
  enabled: true
  timeout_ms: 1200
  endpoint: "http://localhost:18000/mcp"
  group_id: "default"
  recall_max_results: 3
  sync_batch_turns: 3
  async_write: true

reflector:
  enabled: true
  sqlite_path: "${HERMES_HOME}/memory/local_memory/reflector.sqlite"
  async: true
  trigger_every_n_turns: 12
  prefetch_summaries: 1
  conflict_detection: true

ondemand:
  enabled: true
  default_recall: false
  explicit_query_only: true
  max_results: 3
  min_priority: 0
  explicit_query_keywords:
    - "回忆"
    - "记得"
    - "历史"
    - "之前"
    - "上次"
    - "过去"
    - "history"
    - "remember"
    - "recall"
    - "context"

notes_kb:
  enabled: true
  sqlite_path: "${HERMES_HOME}/memory/notes_kb/notes_kb.sqlite"
  source_deletion_policy: "preserve" # preserve | soft_delete | hard_delete
  chunk_chars: 700
  overlap_chars: 120
  search_default_limit: 6
  include_extensions:
    - ".md"
    - ".txt"
    - ".rst"
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".toml"
    - ".ini"
    - ".cfg"
    - ".conf"
    - ".sh"
    - ".bash"
    - ".zsh"
    - ".sql"
    - ".go"
    - ".rs"
    - ".java"
    - ".c"
    - ".cpp"
    - ".h"
    - ".hpp"
    - ".swift"
    - ".kt"
    - ".rb"
    - ".php"
    - ".css"
    - ".scss"
    - ".html"
    - ".xml"

nsfw:
  save: true
  index: true
  default_recall: false
  allow_explicit_history_search: true
  keywords_en:
    - "nsfw"
    - "18+"
    - "adult"
    - "explicit"
    - "erotic"
    - "sex"
    - "sexual"
    - "sexy"
    - "nude"
    - "nudity"
    - "porn"
    - "xxx"
    - "fetish"
    - "kink"
  keywords_zh:
    - "成人"
    - "露骨"
    - "色情"
    - "性爱"
    - "性交"
    - "做爱"
    - "裸体"
    - "无码"
    - "有码"
    - "黄片"
    - "成人视频"
    - "约炮"
    - "调教"
    - "性癖"
  extra_keywords: []
  query_keywords:
    - "nsfw历史"
    - "成人历史"
    - "explicit history"

upgrade_safety:
  do_not_modify_hermes_core: true
  do_not_alter_hermes_sqlite: true
  read_hermes_sqlite_only: true
  write_index_to_sidecar_sqlite: true
  compatibility_adapter_required: true

mem0:
  enabled: true
  api_url: ""
  api_key: ""
  user_id: "default"
  timeout_ms: 6000
  recall_max_results: 3
  fallback_mode: "local_only" # http_only | local_only | http_then_local | local_then_http
  explicit_query_only: true
  explicit_query_keywords:
    - "回忆"
    - "记得"
    - "历史"
    - "上次"
    - "之前"
    - "remember"
    - "recall"
    - "history"
    - "memory"
  retain_async: true
  live_max_content_chars: 3000
  local_backend:
    enabled: true
    llm_provider: "openai"
    llm_base_url: "http://127.0.0.1:3000/grok-web/v1"
    llm_model: "grok-4.20-fast"
    llm_api_key: "local-placeholder"
    embedder_provider: "ollama"
    embedder_model: "bge-m3"
    embedding_dims: 1024
    vector_store_provider: "qdrant"
    storage_path: "${HERMES_HOME}/memory/local_memory/mem0_local_qdrant"
    collection_name: "mem0_local_default_bgem3_1024"
    embedder_api_key: ""
    embedder_base_url: "http://127.0.0.1:11434"

hindsight:
  enabled: false
  mode: local_external
  api_url: "http://127.0.0.1:8882"
  api_key: ""
  bank_id: "default"
  recall_budget: mid
  recall_method: recall # recall | reflect
  recall_max_results: 4
  retain_async: true
  retain_every_n_turns: 1
  timeout_ms: 8000
